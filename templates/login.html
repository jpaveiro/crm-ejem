{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SunOps CRM — Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #2563eb;
      --blue-dk: #1d4ed8;
      --amber:   #f59e0b;
      --red:     #dc2626;
      --bg:      #f4f5f7;
      --surface: #ffffff;
      --border:  #e5e7eb;
      --text:    #111827;
      --muted:   #6b7280;
      --shadow:  0 2px 16px rgba(0,0,0,.08);
    }

    body {
      font-family: "Montserrat", sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }

    .topbar-logo {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .topbar-logo span.sun {
      color: #f59e0b;
    }
    .topbar-logo span.ops {
      color: #2563eb;
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      display: flex;
      width: 1000px;
      min-height: 560px;
      overflow: hidden;
    }

    .panel-form {
      flex: 0 0 50%;
      padding: 80px 68px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .brand .sun {
      color: #f59e0b;
    }
    .brand .ops {
      color: #2563eb;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #6b7280;
      margin-bottom: 40px;
    }

    .campo {
      margin-bottom: 26px;
    }

    .campo label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 1rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 10px;
    }

    .campo label svg {
      width: 16px;
      height: 16px;
      stroke: #9ca3af;
      flex-shrink: 0;
    }

    .campo input {
      width: 100%;
      padding: 15px 20px;
      border: 1.5px solid #e5e7eb;
      border-radius: 999px;
      font-size: 1rem;
      font-family: inherit;
      color: #111;
      background: #fff;
      outline: none;
      transition: border-color 0.18s;
    }

    .campo input::placeholder {
      color: #c0c7d0;
    }
    .campo input:focus {
      border-color: #2563eb;
    }

    .messages {
      margin-bottom: 12px;
    }
    .messages p {
      font-size: 0.82rem;
      color: #dc2626;
    }

    .btn-entrar {
      width: 65%;
      padding: 16px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      margin-top: 14px;
      transition:
        background 0.18s,
        transform 0.1s;
    }

    .btn-entrar:hover {
      background: #1d4ed8;
    }

    .btn-entrar:active {
      transform: scale(0.98);
    }

    .panel-decoration {
      flex: 0 0 50%;
      overflow: hidden;
    }
    .panel-decoration img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
  <body>
    <header class="topbar">
      <div class="topbar-logo">
        <img src="{% static 'BlackLogo.svg' %}" alt="SunOps CRM" height="36" />
        <span>SunOps CRM</span>
      </div>
    </header>

    <div class="page">
      <div class="card">
        <div class="panel-form">
          <div class="brand">
            <span class="sun">Sun</span><span class="ops">Ops</span> CRM
          </div>
          <p class="subtitle">Entre com sua conta para começar.</p>

          <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="campo">
              <label for="email">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="2" y="4" width="20" height="16" rx="2" />
                  <path d="M2 7l10 7 10-7" />
                </svg>
                E-mail
              </label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Exemplo: exemplo@gmail.com"
                required
              />
            </div>

            <div class="campo">
              <label for="senha">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                Senha
              </label>
              <input
                type="password"
                id="senha"
                name="password"
                placeholder="Considere colocar mais de 8 caracteres"
                required
              />
            </div>

            {% if messages %}
            <div class="messages">
              {% for message in messages %}
              <p>{{ message }}</p>
              {% endfor %}
            </div>
            {% endif %}

            <button type="submit" class="btn-entrar">Entrar</button>
          </form>
        </div>

        <div class="panel-decoration">
          <img src="{% static 'SunOps.jpeg' %}" alt="SunOps CRM" />
        </div>
      </div>
    </div>
  </body>
</html>
